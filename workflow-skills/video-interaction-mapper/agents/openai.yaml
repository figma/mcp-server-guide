interface:
  display_name: "Video Interaction Mapper"
  short_description: "Turn UI recordings into Figma storyboards"
  default_prompt: "Use $video-interaction-mapper to map this screen recording into an annotated Figma storyboard."

dependencies:
  tools:
    - type: "mcp"
      value: "figma"
      description: "Figma MCP server with use_figma, upload_assets, create_new_file, and screenshot tools"
      transport: "streamable_http"
      url: "https://mcp.figma.com/mcp"
